spring:
  application:
    name: speechcoach
  datasource:
    url: jdbc:h2:mem:speechcoachdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

server:
  port: 8080

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
