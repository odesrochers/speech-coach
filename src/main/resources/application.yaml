spring:
  application:
    name: speechcoach
  datasource:
    url: jdbc:postgresql://localhost:5432/speechcoach
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
